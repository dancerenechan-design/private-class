<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerence Private class</title>
  <link rel="stylesheet" href="styles.css?v=20260519-1">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Cerence Private class</h1>
    </div>
    <div class="inline-buttons">
      <a class="button secondary" href="admin.html">老師管理</a>
    </div>
  </header>

  <main class="layout">
    <section class="card stack">
      <h2>重要資訊</h2>
      <div id="classRulesContent" style="font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;"></div>
      <p id="classRulesUpdatedAt" class="muted hidden"></p>
    </section>

    <section>
      <h2>即將開班</h2>
      <div class="inline-buttons" style="margin-bottom: 12px;">
        <input type="date" id="searchDate">
        <button id="clearSearchDate" class="button secondary" type="button">清除日期</button>
      </div>
      <div id="upcomingClasses" class="cards"></div>
      <p id="noUpcoming" class="muted hidden">暫時未有即將開班。</p>
    </section>
  </main>

  <div id="appToast" class="app-toast hidden" role="status" aria-live="polite"></div>

  <dialog id="confirmDialog">
    <form method="dialog" class="dialog-form" id="confirmForm">
      <h3 id="confirmTitle">請確認</h3>
      <p id="confirmMessage" class="muted">確定繼續？</p>
      <menu>
        <button value="cancel" class="button secondary" formnovalidate>取消</button>
        <button value="confirm" class="button">確認</button>
      </menu>
    </form>
  </dialog>

  <dialog id="nameDialog">
    <form method="dialog" id="nameForm" class="dialog-form">
      <h3 id="nameDialogTitle">報名</h3>
      <label for="studentName">你的名字</label>
      <input id="studentName" name="studentName" maxlength="30" required>

      <label for="studentPin">PIN 碼（4-6 位數字或字母）</label>
      <input id="studentPin" name="studentPin" maxlength="6" required placeholder="e.g. 1234 或 abc12">

      <label for="studentContact">聯絡方法（只供老師查閱）</label>
      <input id="studentContact" name="studentContact" maxlength="80" placeholder="例如: Wts: 9123456 或 ig: dancerence_chan 或 其他">

      <div id="signupPaymentWrap">
        <label for="studentPaymentMethod">付款方式（未付款可留空）</label>
        <input id="studentPaymentMethod" name="studentPaymentMethod" maxlength="60" placeholder="例如:FPS/Payme/Alipay/Cash">

        <div class="payment-date-row">
          <label for="studentPaymentDate">付款日期</label>
          <input id="studentPaymentDate" name="studentPaymentDate" type="date">
        </div>
      </div>

      <menu>
        <button value="cancel" class="button secondary" formnovalidate>取消</button>
        <button value="confirm" class="button">確認</button>
      </menu>
    </form>
  </dialog>

  <dialog id="statusDialog">
    <form method="dialog" id="statusForm" class="dialog-form">
      <h3 id="statusDialogTitle">更新資料</h3>
      <div id="statusPinGate" class="stack">
        <label for="confirmPin">請輸入你的 PIN 碼</label>
        <input id="confirmPin" maxlength="6" required placeholder="e.g. 1234">
        <p id="statusVerifyHint" class="muted">請先驗證 PIN 才可編輯資料。</p>
        <button type="button" id="verifyPinBtn" class="button secondary">驗證 PIN</button>
      </div>

      <div id="paymentMethodWrap" class="hidden">
        <label for="paymentMethodInput">付款方式</label>
        <input id="paymentMethodInput" maxlength="60" placeholder="可自由輸入，例如:FPS/Payme/Alipay/Cash">
        <div class="payment-date-row">
          <label for="paymentDateInput">付款日期</label>
          <input id="paymentDateInput" type="date">
        </div>
      </div>

      <div id="statusContactWrap" class="hidden">
        <label for="statusContactInput">聯絡方法（只供老師查閱）</label>
        <input id="statusContactInput" maxlength="80" placeholder="例如: Wts: 9123456 或 ig: dancerence_chan 或 其他(已有)">
      </div>

      <menu>
        <button type="button" id="cancelBookingBtn" class="button danger">取消報名</button>
        <button value="dismiss" class="button secondary" formnovalidate>關閉</button>
        <button id="saveStatusBtn" value="save" class="button">儲存</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="app.js?v=20260521-1"></script>
</body>
</html>
