<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerene Private Class - 操作歷史</title>
  <link rel="stylesheet" href="styles.css?v=20260519-1">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Cerene Private Class - 操作歷史</h1>
    </div>
    <div class="inline-buttons">
      <a class="button secondary" href="admin.html">返回 Admin</a>
      <a class="button secondary" href="index.html">返回學生頁</a>
    </div>
  </header>

  <main class="layout">
    <section class="card stack">
      <h2>篩選</h2>
      <button id="refreshOpsBtn" class="button secondary" type="button">重新整理記錄</button>
      <label for="dateFilter">日期</label>
      <input type="date" id="dateFilter">
      <button id="clearDateFilter" class="button secondary" type="button">清除日期篩選</button>

      <label for="actionFilter">操作類型</label>
      <select id="actionFilter">
        <option value="">所有操作</option>
        <option value="student">學生操作</option>
        <option value="admin">Admin 操作</option>
      </select>
    </section>

    <section>
      <h2>所有操作</h2>
      <div id="operationList"></div>

      <div id="paginationControls" class="inline-buttons" style="margin-top: 20px;">
        <button id="prevBtn" class="button secondary" type="button">← 上一頁</button>
        <span id="pageInfo" class="muted"></span>
        <button id="nextBtn" class="button secondary" type="button">下一頁 →</button>
      </div>

      <p id="noOperation" class="muted hidden">暫時未有操作記錄。</p>
    </section>
  </main>

  <script type="module" src="admin-history.js?v=20260519-1"></script>
</body>
</html>
