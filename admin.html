<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerene Private Class - Admin</title>
  <link rel="stylesheet" href="styles.css?v=20260519-1">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Cerene Private Class - Admin</h1>
      <p class="muted">新增或編輯班期</p>
    </div>
    <div class="inline-buttons">
      <a class="button secondary" href="class-management.html">班期管理</a>
      <a class="button secondary" href="history.html">歷史班期</a>
      <a class="button secondary" href="admin-history.html">操作歷史</a>
      <a class="button secondary" href="index.html">返回學生頁</a>
      <button id="logoutBtn" class="button secondary hidden" type="button">登出</button>
    </div>
  </header>

  <main class="layout">
    <section id="loginSection" class="card">
      <h2>管理登入</h2>
      <form id="loginForm" class="stack">
        <label for="adminEmail">Admin Email</label>
        <input type="email" id="adminEmail" required>

        <label for="adminPassword">Admin Password</label>
        <input type="password" id="adminPassword" required>
        <button class="button" type="submit">登入</button>
      </form>
      <p class="muted">使用 Firebase Authentication 帳號登入。</p>
    </section>

    <section id="adminSection" class="hidden">
      <form id="classForm" class="card stack">
        <h2 id="formTitle">新增班期</h2>
        <input type="hidden" id="editingClassId">

        <label for="date">日期</label>
        <input type="date" id="date" required>

        <div class="grid2">
          <div>
            <label>開始時間</label>
            <div class="inline-buttons">
              <select id="startHour" required></select>
              <span>:</span>
              <select id="startMinute" required></select>
            </div>
          </div>
          <div>
            <label>結束時間</label>
            <div class="inline-buttons">
              <select id="endHour" required></select>
              <span>:</span>
              <select id="endMinute" required></select>
            </div>
          </div>
        </div>

        <label for="location">地點</label>
        <input id="location" maxlength="60" required>

        <fieldset>
          <legend>Level（可選多個）</legend>
          <div class="inline-checks">
            <label><input type="checkbox" name="levels" value="Lv0"> Lv0</label>
            <label><input type="checkbox" name="levels" value="Lv1"> Lv1</label>
            <label><input type="checkbox" name="levels" value="Lv2"> Lv2</label>
          </div>
        </fieldset>

        <div id="songFields" class="stack"></div>

        <div class="inline-buttons">
          <button class="button" type="submit">儲存班期</button>
          <button id="cancelEdit" class="button secondary hidden" type="button">取消編輯</button>
        </div>
      </form>

      <section class="card stack" style="margin-top: 24px;">
        <h2>課堂資訊管理</h2>
        <p class="muted">編輯學生報名頁面上顯示的重要資訊</p>
        <form id="classRulesForm" class="stack">
          <label for="classRulesText">資訊內容</label>
          <textarea id="classRulesText" rows="20" style="font-family: monospace; font-size: 13px;"></textarea>

          <fieldset class="stack">
            <legend>連結</legend>
            <div id="linkList" class="stack"></div>
            <button type="button" id="addLinkBtn" class="button secondary">＋ 新增連結</button>
          </fieldset>

          <button class="button" type="submit">保存課堂資訊</button>
        </form>
        <p id="rulesStatus" class="muted hidden"></p>
      </section>
    </section>
  </main>

  <script type="module" src="admin.js?v=20260522-3"></script>
</body>
</html>
