<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerene Private Class - 班期管理</title>
  <link rel="stylesheet" href="styles.css?v=20260519-1">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Cerene Private Class - 班期管理</h1>
      <p class="muted">按日期搜尋並管理班期</p>
    </div>
    <div class="inline-buttons">
      <a class="button secondary" href="admin.html">返回 Admin</a>
      <a class="button secondary" href="index.html">返回學生頁</a>
    </div>
  </header>

  <main class="layout">
    <section class="card stack">
      <h2>搜尋條件</h2>
      <label for="searchDate">日期</label>
      <div class="inline-buttons">
        <input type="date" id="searchDate">
        <button id="clearSearch" class="button secondary" type="button">清除搜尋</button>
        <button id="sortToggle" class="button secondary" type="button">時間 ↑</button>
      </div>
      <p class="muted">留空即顯示所有未開班班期。</p>
    </section>

    <section>
      <h2>班期列表</h2>
      <div id="classList" class="cards"></div>
      <p id="noClass" class="muted hidden">找不到對應班期。</p>
    </section>
  </main>


  <dialog id="editClassDialog">
    <form id="editClassForm" class="stack">
      <h2>編輯班期</h2>
      <input type="hidden" id="editClassId">

      <label for="editDate">日期</label>
      <input type="date" id="editDate" required>

      <div class="grid2">
        <div>
          <label>開始時間</label>
          <div class="inline-buttons">
            <select id="editStartHour"></select>
            <span>:</span>
            <select id="editStartMinute"></select>
          </div>
        </div>
        <div>
          <label>結束時間</label>
          <div class="inline-buttons">
            <select id="editEndHour"></select>
            <span>:</span>
            <select id="editEndMinute"></select>
          </div>
        </div>
      </div>

      <label for="editLocation">地點</label>
      <input id="editLocation" maxlength="60" required>

      <fieldset>
        <legend>Level（可選多個）</legend>
        <div class="inline-checks">
          <label><input type="checkbox" name="editLevels" value="Lv0"> Lv0</label>
          <label><input type="checkbox" name="editLevels" value="Lv1"> Lv1</label>
          <label><input type="checkbox" name="editLevels" value="Lv2"> Lv2</label>
        </div>
      </fieldset>

      <div id="editSongFields" class="stack"></div>

      <div class="inline-buttons">
        <button class="button" type="submit">儲存</button>
        <button class="button secondary" type="button" id="cancelEditClassBtn">取消</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="class-management.js?v=20260521-3"></script>
</body>
</html>
